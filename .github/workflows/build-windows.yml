name: Build Windows Launcher

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run dist:win

      - uses: actions/upload-artifact@v4
        with:
          name: crackedpulse
          path: dist/crackedpulse.exe
